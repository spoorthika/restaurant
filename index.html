<!DOCTYPE html>
<html>
<head>
    <title>Restaurant App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .box {
            width: 1000px;
            max-width: 100%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 15px;
            margin-right: 10px;
            margin-bottom: 10px;
            border: none;
            background: #2f7a57;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #e8f1eb;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Restaurant App</h1>

        <button onclick="loadData('orders')">Orders</button>
        <button onclick="loadData('payments')">Payments</button>
        <button onclick="loadData('menu')">Menu</button>

        <h2 id="title">Orders</h2>
        <div id="output">Loading...</div>
    </div>

    <script>
        function loadData(type) {
            document.getElementById("title").innerHTML = type;
            document.getElementById("output").innerHTML = "Loading...";

            fetch("/" + type)
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    if (data.error) {
                        document.getElementById("output").innerHTML = data.error;
                    } else {
                        showTable(type, data);
                    }
                })
                .catch(function() {
                    document.getElementById("output").innerHTML = "Error loading data";
                });
        }

        function showTable(type, data) {
            if (data.length === 0) {
                document.getElementById("output").innerHTML = "No data found";
                return;
            }

            var columns = [];

            if (type === "orders") {
                columns = ["order_id", "order_date", "items", "quantity", "order_total"];
            } else if (type === "payments") {
                columns = ["payment_id", "order_id", "payment_date", "payment_type", "amount_due", "tips", "discount", "total_paid", "payment_status"];
            } else {
                columns = ["item_id", "item_name", "category_name", "menu_name", "size", "price"];
            }

            var html = "<table><tr>";

            for (var i = 0; i < columns.length; i++) {
                html += "<th>" + columns[i] + "</th>";
            }

            html += "</tr>";

            for (var i = 0; i < data.length; i++) {
                html += "<tr>";

                for (var j = 0; j < columns.length; j++) {
                    var value = data[i][columns[j]];

                    if (value == null) {
                        value = "";
                    }

                    html += "<td>" + value + "</td>";
                }

                html += "</tr>";
            }

            html += "</table>";
            document.getElementById("output").innerHTML = html;
        }

        loadData("orders");
    </script>
</body>
</html>
